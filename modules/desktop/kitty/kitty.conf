include dank-tabs.conf
include dank-theme.conf

# Fonts
font_size 12
disable_ligatures cursor

# Cursor
cursor none
cursor_text_color background
cursor_trail 1000

# Scrollback
scrollback_fill_enlarged_window yes

# Mouse
show_hyperlink_targets yes
clear_selection_on_clipboard_loss yes
paste_actions quote-urls-at-prompt,replace-newline,confirm
strip_trailing_spaces smart
focus_follows_mouse yes

# Bell
enable_audio_bell no

# Window Layout
window_padding_width 10
hide_window_decorations no
confirm_os_window_close 0 count-background

# Color Scheme
background_opacity 1
background_blur 1

# Keybinds
map kitty_mod+n new_os_window_with_cwd
map kitty_mod+t new_tab_with_cwd
map ctrl+c copy_or_noop
map ctrl+shift+equal change_font_size all +1.0
map ctrl+shift+plus change_font_size all +1.0
map ctrl+shift+kp_add change_font_size all +1.0
map ctrl+shift+minus change_font_size all -1.0
map ctrl+shift+kp_subtract change_font_size all -1.0
